<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Batalha Matemática Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #0a1628;
    background: radial-gradient(circle at center, #1a3a6b 0%, #0a1628 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  /* Bloqueio Desktop */
  #desktop-block {
    position: fixed; inset: 0; background: #0a1628; z-index: 9999;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px;
  }
  @media (min-width: 1025px) { #desktop-block { display: flex; } }

  header { position: relative; z-index: 10; text-align: center; padding: 1rem; }
  header h1 { font-family: 'Fredoka One', cursive; color: #FFD700; font-size: 2rem; text-shadow: 0 4px 0 #b8860b; }

  .difficulty-bar { display: flex; justify-content: center; gap: 8px; padding: 10px; position: relative; z-index: 10; }
  .diff-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.3); color: #fff; background: rgba(255,255,255,0.1); cursor: pointer; font-weight: 800; font-size: 0.8rem; }
  .diff-btn.active { background: #FFD700; color: #0a1628; border-color: #FFD700; }

  .game-container { display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 10px; max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }

  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
  .cell { width: 42px; height: 42px; background: rgba(59,130,246,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
  .cell.hit { background: #ef4444; box-shadow: inset 0 0 10px #000; border-color: #ff0000; }
  .cell.miss { background: rgba(255,255,255,0.1); opacity: 0.5; }
  .cell.ship-player { background: rgba(16,185,129,0.3); border: 1px solid #10b981; }
  .cell.revealed { cursor: default; }

  .status-panel { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; width: 100%; text-align: center; transition: 0.4s; }
  .status-panel.active-player { border-color: #4ade80; box-shadow: 0 0 20px rgba(74,222,128,0.2); }
  .status-panel.active-enemy { border-color: #f87171; box-shadow: 0 0 20px rgba(248,113,113,0.2); }

  .turn-indicator { padding: 10px; border-radius: 12px; font-weight: 900; margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .turn-indicator.player { background: #4ade80; color: #065f46; }
  .turn-indicator.enemy { background: #f87171; color: #7f1d1d; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,15,0.95); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #1a3a6b; padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; border: 3px solid #3b82f6; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  
  .timer-wrap { width: 100%; background: #0a1628; height: 14px; border-radius: 7px; margin: 15px 0; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.2); }
  #timer-bar { width: 100%; height: 100%; background: #4ade80; transition: width 0.1s linear; }
  
  .modal-question { font-family: 'Fredoka One'; font-size: 2.2rem; color: #FFD700; margin: 15px 0; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .opt-btn { padding: 15px; border-radius: 12px; border: none; background: #2a4a7b; color: white; font-weight: 900; font-size: 1.3rem; cursor: pointer; transition: 0.1s; border-bottom: 4px solid #162a4d; }
  .opt-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

  .endgame { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .endgame.show { display: flex; }

  @media (max-width: 400px) { .cell { width: 36px; height: 36px; } }
</style>
</head>
<body>

<div id="desktop-block">
    <h1>📱 Use o Celular</h1>
    <p>Gire para o modo retrato ou acesse via mobile.</p>
</div>

<header><h1>⚓ BATALHA MATEMÁTICA</h1></header>

<div class="difficulty-bar">
  <button class="diff-btn active" data-d="facil">FÁCIL</button>
  <button class="diff-btn" data-d="medio">MÉDIO</button>
  <button class="diff-btn" data-d="dificil">DIFÍCIL</button>
</div>

<div class="game-container">
  <div class="board-section">
    <div style="font-size:0.8rem; margin-bottom:5px; color:#aaa; font-weight:bold;">CAMPO INIMIGO</div>
    <div class="grid" id="enemy-grid"></div>
  </div>

  <div class="status-panel active-player" id="ui-panel">
    <div id="turn-display" class="turn-indicator player">🎯 SUA VEZ</div>
    <div style="display:flex; justify-content: space-around; margin-bottom:10px; font-weight:900;">
        <div style="color:#4ade80">VOCÊ: <span id="p-score">0</span></div>
        <div style="color:#f87171">ELE: <span id="e-score">0</span></div>
    </div>
    <div id="log" style="font-size: 0.8rem; color: #a8d8ff; min-height:1.2rem;">Escolha uma coordenada!</div>
  </div>

  <div class="board-section">
    <div style="font-size:0.8rem; margin-bottom:5px; color:#aaa; font-weight:bold;">SUA FROTA</div>
    <div class="grid" id="player-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div id="cat" style="font-size: 0.8rem; font-weight:900; color: #a8d8ff; text-transform: uppercase;">CATEGORIA</div>
    <div class="timer-wrap"><div id="timer-bar"></div></div>
    <div class="modal-question" id="q-text">12 + 5</div>
    <div class="options-grid" id="opts"></div>
    <div id="feedback" style="margin-top:15px; font-weight:bold; height: 20px;"></div>
  </div>
</div>

<div class="endgame" id="endgame">
  <h1 id="end-title" style="font-family: 'Fredoka One'; font-size: 3rem; color:#FFD700;">VITÓRIA</h1>
  <p id="end-msg" style="margin: 20px; font-size: 1.2rem;"></p>
  <button onclick="restartGame()" style="padding:15px 40px; font-weight:900; border-radius:15px; background:#4ade80; color:#065f46; border:none; cursor:pointer; font-size:1.1rem;">NOVA BATALHA</button>
</div>

<script>
// Sistema de Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSfx(f, t, d, vol = 0.1) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = t;
    o.frequency.value = f;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + d);
}

// SOM DE CLARINETE (Vitória Usuário)
function playClarinetVictory() {
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
    notes.forEach((freq, i) => {
        setTimeout(() => playSfx(freq, 'triangle', 0.6, 0.15), i * 200);
    });
}

// SOM DE GUERRA/EXPLOSÕES (Inimigo Ganha)
function playWarChaos() {
    for(let i=0; i<15; i++) {
        setTimeout(() => {
            playSfx(Math.random() * 100 + 40, 'sawtooth', 0.8, 0.2); // Explosão grave
            playSfx(Math.random() * 500 + 100, 'square', 0.1, 0.05); // Estilhaço
        }, i * 150);
    }
}

const GRID = 7;
const SHIPS = [3, 3, 2, 2, 2];
let difficulty = 'facil';
let playerBoard, enemyBoard, playerShips, enemyShips, playerShotHistory;
let pScore = 0, eScore = 0, pLeft, eLeft;
let isPlayerTurn = true, gameOver = false;
let timerInt, timeLeft, pending;

function generateQuestion(diff) {
    let a, b, c, q, ans, cat;
    let opts = [];
    if (diff === 'facil') {
        const op = Math.random() > 0.5 ? '+' : '-';
        a = Math.floor(Math.random() * 30) + 5;
        b = Math.floor(Math.random() * 20) + 1;
        if (op === '+') { ans = a + b; q = `${a} + ${b}`; cat = "Soma"; }
        else { ans = Math.max(a, b) - Math.min(a, b); q = `${Math.max(a, b)} - ${Math.min(a, b)}`; cat = "Subtração"; }
    } 
    else if (diff === 'medio') {
        const mode = Math.floor(Math.random() * 3);
        if (mode === 0) {
            a = Math.floor(Math.random() * 11) + 2; b = Math.floor(Math.random() * 12) + 2;
            ans = a * b; q = `${a} x ${b}`; cat = "Multiplicação";
        } else if (mode === 1) {
            ans = Math.floor(Math.random() * 9) + 2; b = Math.floor(Math.random() * 10) + 2;
            a = ans * b; q = `${a} ÷ ${b}`; cat = "Divisão";
        } else {
            a = Math.floor(Math.random() * 10) + 2; ans = a * a; q = `${a}²`; cat = "Potência";
        }
    } 
    else {
        const mode = Math.floor(Math.random() * 3);
        if (mode === 0) {
            ans = Math.floor(Math.random() * 10) + 1; a = Math.floor(Math.random() * 5) + 2;
            b = Math.floor(Math.random() * 15) + 1; c = (a * ans) + b;
            q = `${a}x + ${b} = ${c}`; cat = "Equação (Ache X)";
        } else if (mode === 1) {
            const bases = [11, 12, 13, 14, 15, 20]; ans = bases[Math.floor(Math.random() * bases.length)];
            q = `√${ans * ans}`; cat = "Raiz Quadrada";
        } else {
            const perc = [10, 20, 25, 50, 75]; a = perc[Math.floor(Math.random() * perc.length)];
            b = (Math.floor(Math.random() * 10) + 1) * 20; ans = (a / 100) * b;
            q = `${a}% de ${b}`; cat = "Porcentagem";
        }
    }
    opts.push(ans);
    while (opts.length < 4) {
        let offset = Math.floor(Math.random() * 11) - 5;
        if (offset === 0) offset = 5;
        let wrong = ans + offset;
        if (wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
    }
    return { q, a: ans, o: opts.sort((x, y) => x - y), cat };
}

function initBoards() {
    playerBoard = Array(GRID).fill().map(()=>Array(GRID).fill(0));
    enemyBoard = Array(GRID).fill().map(()=>Array(GRID).fill(0));
    playerShotHistory = Array(GRID).fill().map(()=>Array(GRID).fill(false));
    playerShips = placeAll(playerBoard);
    enemyShips = placeAll(enemyBoard);
}

function placeAll(board) {
    let shipObjs = [];
    SHIPS.forEach(size => {
        let ok = false;
        while(!ok) {
            let horiz = Math.random() < 0.5;
            let r = Math.floor(Math.random()*(horiz?GRID:GRID-size));
            let c = Math.floor(Math.random()*(horiz?GRID-size:GRID));
            let cells = [];
            for(let i=0; i<size; i++) cells.push(horiz ? [r, c+i] : [r+i, c]);
            if(cells.every(([rr,cc])=>board[rr][cc]===0)) {
                cells.forEach(([rr,cc])=>board[rr][cc]=1);
                shipObjs.push({cells, hits:0, size});
                ok = true;
            }
        }
    });
    return shipObjs;
}

function render() {
    const pGrid = document.getElementById('player-grid');
    const eGrid = document.getElementById('enemy-grid');
    pGrid.innerHTML = ''; eGrid.innerHTML = '';
    for(let i=0; i<GRID*GRID; i++) {
        let r = Math.floor(i/GRID), c = i%GRID;
        let pCell = document.createElement('div'); pCell.className='cell';
        if(playerBoard[r][c]===1) pCell.classList.add('ship-player');
        pGrid.appendChild(pCell);
        let eCell = document.createElement('div'); eCell.className='cell';
        eCell.onclick = () => attack(r, c, eCell);
        eGrid.appendChild(eCell);
    }
}

function attack(r, c, cell) {
    if(!isPlayerTurn || gameOver || cell.classList.contains('revealed')) return;
    pending = {r, c, cell};
    openQuestion();
}

function openQuestion() {
    const data = generateQuestion(difficulty);
    document.getElementById('cat').textContent = data.cat;
    document.getElementById('q-text').textContent = data.q;
    document.getElementById('modal').classList.add('open');
    document.getElementById('feedback').textContent = '';
    const oBox = document.getElementById('opts');
    oBox.innerHTML = '';
    data.o.forEach(val => {
        let btn = document.createElement('button'); btn.className='opt-btn'; btn.textContent=val;
        btn.onclick = () => check(val, data.a);
        oBox.appendChild(btn);
    });
    startTimer(data.a);
}

function startTimer(correctAns) {
    timeLeft = 10.0;
    const bar = document.getElementById('timer-bar');
    clearInterval(timerInt);
    timerInt = setInterval(() => {
        timeLeft -= 0.1;
        bar.style.width = (timeLeft * 10) + "%";
        if(timeLeft <= 0) { clearInterval(timerInt); check(-999, correctAns); }
    }, 100);
}

function check(val, correct) {
    clearInterval(timerInt);
    const isCorrect = (val === correct);
    const feed = document.getElementById('feedback');
    if(isCorrect) {
        playSfx(800, 'sine', 0.2);
        feed.textContent = "CORRETO!"; feed.style.color = "#4ade80";
        setTimeout(()=> { document.getElementById('modal').classList.remove('open'); resolve(true); }, 700);
    } else {
        playSfx(150, 'square', 0.4);
        feed.textContent = val === -999 ? "TEMPO ESGOTADO!" : "RESPOSTA ERRADA!";
        feed.style.color = "#f87171";
        setTimeout(()=> { document.getElementById('modal').classList.remove('open'); resolve(false); }, 1200);
    }
}

function resolve(hitSuccess) {
    const {r, c, cell} = pending;
    cell.classList.add('revealed');
    if(hitSuccess && enemyBoard[r][c] === 1) {
        cell.classList.add('hit'); cell.textContent = '💥';
        pScore++; document.getElementById('p-score').textContent = pScore;
        if(checkSunk(enemyShips, r, c)) { eLeft--; if(eLeft === 0) return end(true); }
        document.getElementById('log').textContent = "🎯 No alvo! Jogue novamente.";
    } else {
        cell.classList.add('miss'); cell.textContent = '🌊';
        document.getElementById('log').textContent = "Vez do inimigo.";
        isPlayerTurn = false; updateTurnUI();
        setTimeout(enemyTurn, 1500);
    }
}

function checkSunk(fleet, r, c) {
    let s = fleet.find(ship => ship.cells.some(cc => cc[0]===r && cc[1]===c));
    if(s) { s.hits++; return s.hits >= s.size; }
    return false;
}

function enemyTurn() {
    if(gameOver) return;
    let r, c;
    do { r = Math.floor(Math.random()*GRID); c = Math.floor(Math.random()*GRID); } while(playerShotHistory[r][c]);
    playerShotHistory[r][c] = true;
    const cells = document.querySelectorAll('#player-grid .cell');
    const cell = cells[r*GRID + c];
    cell.classList.add('revealed');
    if(playerBoard[r][c] === 1) {
        cell.classList.add('hit'); cell.textContent = '💥';
        eScore++; document.getElementById('e-score').textContent = eScore;
        if(checkSunk(playerShips, r, c)) { pLeft--; if(pLeft === 0) return end(false); }
        setTimeout(enemyTurn, 1000);
    } else {
        cell.classList.add('miss'); cell.textContent = '🌊';
        isPlayerTurn = true; updateTurnUI();
    }
}

function updateTurnUI() {
    const disp = document.getElementById('turn-display');
    const panel = document.getElementById('ui-panel');
    if(isPlayerTurn) {
        disp.textContent = "🎯 SUA VEZ"; disp.className = "turn-indicator player";
        panel.className = "status-panel active-player";
    } else {
        disp.textContent = "⚔️ VEZ DO INIMIGO"; disp.className = "turn-indicator enemy";
        panel.className = "status-panel active-enemy";
    }
}

function end(win) {
    gameOver = true;
    document.getElementById('endgame').classList.add('show');
    document.getElementById('end-title').textContent = win ? "VITÓRIA!" : "DERROTA!";
    document.getElementById('end-msg').textContent = win ? "Sua maestria matemática venceu a guerra!" : "O inimigo bombardeou sua frota!";
    
    if(win) {
        playClarinetVictory();
    } else {
        playWarChaos();
    }
}

function restartGame() {
    gameOver = false; isPlayerTurn = true;
    pScore = 0; eScore = 0; pLeft = SHIPS.length; eLeft = SHIPS.length;
    document.getElementById('p-score').textContent = 0;
    document.getElementById('e-score').textContent = 0;
    document.getElementById('endgame').classList.remove('show');
    initBoards(); render(); updateTurnUI();
}

document.querySelectorAll('.diff-btn').forEach(b => {
    b.onclick = () => {
        document.querySelector('.diff-btn.active').classList.remove('active');
        b.classList.add('active'); difficulty = b.dataset.d; restartGame();
    }
});

restartGame();
</script>
</body>
</html>
